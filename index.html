<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANTAGE AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 15px; padding: 12px; border-radius: 15px; max-width: 85%; line-height: 1.4; }
        .user { background: #222; align-self: flex-end; color: #fff; border: 1px solid #444; }
        .ai { background: #fff; align-self: flex-start; color: #000; }
        .input-area { padding: 15px; background: #111; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; background: #222; color: #fff; outline: none; }
        button { padding: 10px 20px; background: #fff; color: #000; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Pose ta question à VANTAGE...">
        <button onclick="sendMessage()">Envoyer</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            if (!input.value.trim()) return;

            const userText = input.value;
            chat.innerHTML += `<div class="msg user">${userText}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: userText })
                });
                const data = await response.json();
                chat.innerHTML += `<div class="msg ai">${data.response || "Erreur..."}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg ai">Erreur de connexion.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
